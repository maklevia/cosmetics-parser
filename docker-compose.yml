services:
  # The Database Service (PostgreSQL for TypeORM)
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The API Service
  api:
    # Build from the root context using the file in the new folder
    build:
      context: .
      dockerfile: docker-files/Dockerfile.api
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    environment:
      - PORT=${API_PORT:-3000}
      - DB_HOST=db
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev --workspace=api
    depends_on:
      - db



# Declare the persistent volume for the database
volumes:
  postgres_data:
